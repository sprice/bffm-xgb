<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Discover your Big Five personality traits in under 3 minutes. 20 questions, machine-learning scored with the BFFM-XGB model." />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f8f6f3" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1a1816" />
    <script>
      (function () {
        try {
          var root = document.documentElement;
          var saved = localStorage.getItem("bffm-xgb-theme");
          var effective =
            saved === "light" || saved === "dark"
              ? saved
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";

          if (saved === "light" || saved === "dark") {
            root.classList.add(saved);
          }
          root.style.colorScheme = effective;
        } catch (e) {}
      })();
    </script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>5</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>Big Five Personality Assessment</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/client/main.tsx"></script>
  </body>
</html>
