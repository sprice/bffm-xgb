name: ablation_stratified
description: "Ablation: focused sparsity on ext-est-opn stratified split"
output_dir: models/ablation_stratified
data_dir: data/processed/ext_est_opn
artifacts_dir: artifacts

sparsity:
  enabled: true
  focused: true
  include_mini_ipip: true
  include_imbalanced: false
  n_augmentation_passes: 3

hyperparameters:
  locked_params: artifacts/tuned_params.json
  lock_policy: reference_model_hash
  reference_model_dir: models/reference

training:
  random_state: 42
  n_jobs: 16

validation:
  min_pearson_r: 0.88
  min_coverage_90: 0.85
  per_domain:
    min_pearson_r: 0.84
    min_coverage_90: 0.80
  sparse_20:
    enabled: true
    min_pearson_r: 0.86
    min_coverage_90: 0.82
    per_domain:
      min_pearson_r: 0.78
      min_coverage_90: 0.74
